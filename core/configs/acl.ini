; Tiger core ACL policy — the canonical role graph + baseline. TIGER-OWNED.
; Loaded by Tiger_Acl_Acl (ini first = canonical), then DB rows layer on top.
; Modules ship their own configs/acl.ini for their resources + rules.
;
; Roles here are the role NAMES stored in org_user.role (role-on-membership). The
; whole policy is DATA — deny-all baseline, god-mode, and public exemptions — the
; engine hard-codes nothing.
[production]

; --- Roles: the BASE hierarchy — sensible for ~80% of apps, full inheritance ---
; A single chain where each role inherits everything below it (resolved
; parent-before-child, topologically):
;
;   guest > user > manager > supermanager > admin > superadmin > developer
;
; An app adds/renames/re-parents its own roles via a module acl.ini or the
; acl_role table — this is just the default spine.
acl.roles.guest.role         = "guest"
acl.roles.guest.description  = "Unauthenticated request"

acl.roles.user.role          = "user"
acl.roles.user.parent        = "guest"
acl.roles.user.description   = "Authenticated base user"

acl.roles.manager.role       = "manager"
acl.roles.manager.parent     = "user"
acl.roles.manager.description= "Tenant-scope manager (manages within their own org)"

acl.roles.supermanager.role        = "supermanager"
acl.roles.supermanager.parent      = "manager"
acl.roles.supermanager.description = "Tenant + sub-tenant scope (their org and its child orgs, via parent_org_id)"

acl.roles.admin.role         = "admin"
acl.roles.admin.parent       = "supermanager"
acl.roles.admin.description  = "Administrator"

acl.roles.superadmin.role        = "superadmin"
acl.roles.superadmin.parent      = "admin"
acl.roles.superadmin.description = "Platform administrator"

acl.roles.developer.role         = "developer"
acl.roles.developer.parent       = "superadmin"
acl.roles.developer.description  = "God role — allowed on every resource"

; --- Resources (default-namespace public entry points) ----------------------
acl.resources.index.resource = "IndexController"
acl.resources.auth.resource  = "AuthController"
acl.resources.api.resource   = "ApiController"
acl.resources.error.resource = "ErrorController"
acl.resources.admin.resource = "AdminController"
acl.resources.page.resource  = "PageController"
acl.resources.validate.resource = "Tiger_Service_Validate"
acl.resources.token.resource    = "Tiger_Service_Token"

; --- Rules ------------------------------------------------------------------
; Baseline: deny everything to everyone (the deny-by-default spine).
acl.rules.denyall.role       = "*"
acl.rules.denyall.resource   = "*"
acl.rules.denyall.privilege  = "*"
acl.rules.denyall.permission = "deny"

; God mode: developer may do anything.
acl.rules.dev.role       = "developer"
acl.rules.dev.resource   = "*"
acl.rules.dev.privilege  = "*"
acl.rules.dev.permission = "allow"

; Personal access tokens — any authenticated user (role `user`, inherited upward) manages their OWN
; tokens; ownership is enforced in Tiger_Service_Token.
acl.rules.token.role       = "user"
acl.rules.token.resource   = "Tiger_Service_Token"
acl.rules.token.permission = "allow"

; Public entry points — allowed to guests (and, by inheritance, everyone).
acl.rules.pub_index.role       = "guest"
acl.rules.pub_index.resource   = "IndexController"
acl.rules.pub_index.permission = "allow"

acl.rules.pub_auth.role       = "guest"
acl.rules.pub_auth.resource   = "AuthController"
acl.rules.pub_auth.permission = "allow"

; /api is public at the gateway; the ServiceFactory gates each SERVICE by its own ACL.
acl.rules.pub_api.role       = "guest"
acl.rules.pub_api.resource   = "ApiController"
acl.rules.pub_api.permission = "allow"

; Convenience validation is a public core service (Tiger_Service_Validate) — the ONE
; explicit allow that makes a Tiger_Service_* reachable via /api. It only validates form
; fields (read-only), so it's safe for guests (e.g. a public signup form).
acl.rules.pub_validate.role       = "guest"
acl.rules.pub_validate.resource   = "Tiger_Service_Validate"
acl.rules.pub_validate.permission = "allow"

; Location Service — a public core service (address autocomplete / reverse / own-IP lookup)
; so public forms like signup can use it. Read-only lookups; safe for guests.
acl.resources.location.resource    = "Tiger_Service_Location"
acl.rules.pub_location.role       = "guest"
acl.rules.pub_location.resource   = "Tiger_Service_Location"
acl.rules.pub_location.permission = "allow"

acl.rules.pub_error.role       = "guest"
acl.rules.pub_error.resource   = "ErrorController"
acl.rules.pub_error.permission = "allow"

; CMS pages are public (published content); the dispatcher only sends real pages here.
acl.rules.pub_page.role       = "guest"
acl.rules.pub_page.resource   = "PageController"
acl.rules.pub_page.permission = "allow"

; The back office — admin and above (manager/user/guest are denied by baseline).
acl.rules.admin_area.role       = "admin"
acl.rules.admin_area.resource   = "AdminController"
acl.rules.admin_area.permission = "allow"

