; ==============================================================================
;  TIGER-OWNED - DO NOT EDIT. Ships in the framework and is REPLACED on every
;  update (composer update / Module Manager) -- any edit here is SILENTLY LOST.
;  Customize by OVERRIDING in an APP-OWNED tier (merges on top, later wins, and
;  survives updates): application/configs/application.ini * local.ini (secrets) *
;  the `config` DB table (runtime, no deploy).  ACL rules: your OWN module's
;  acl.ini or the acl_* DB tables.  See ARCHITECTURE.md Sec 0 + Sec 5 (cascade).
; ==============================================================================

[production]
phpSettings.display_startup_errors = 0
phpSettings.display_errors = 0

; The app's Bootstrap extends Tiger_Application_Bootstrap:
bootstrap.path  = APPLICATION_PATH "/Bootstrap.php"
bootstrap.class = "Bootstrap"

; Module scanning: app modules from application/modules; first-party core
; modules are added by Tiger_Application_Bootstrap::_initTigerPaths.
resources.frontController.moduleDirectory = APPLICATION_PATH "/modules"
resources.frontController.defaultModule = "default"
resources.frontController.params.displayExceptions = 0
resources.modules[] =

; Active theme + skin defaults (override in application.ini, or per-org via DB later):
tiger.theme = "puma"
tiger.skin  = "puma"    ; default skin (Bootswatch Zephyr palette); swap live via the skin switcher

; Site identity — editable in the admin Settings screen (stored in the `config` table,
; per-org via the DB layer). home_page = a CMS page_id served at "/" ('' = built-in landing).
tiger.site.name      = "Tiger"
tiger.site.home_page =

; Asset cache-busting (Tiger_View_Helper_Asset) — append ?v=<filemtime> to asset URLs
; so browsers pick up changed CSS/JS after a deploy. 1 = on (default), 0 = off.
tiger.assets.cache_bust = 1

; I18N — supported languages (LANGUAGE-ONLY per convention: en, es, … NOT en_US) +
; the default. The locale plugin resolves the request language (URL /xx/ prefix >
; cookie > browser Accept-Language > default) and enables semantic /es/... URLs on
; every route. The header language switcher writes the same cookie + localStorage.
tiger.i18n.locales = "en,es"
tiger.i18n.default = "en"

; Self-service profile — the type lists offered on the Contacts + Addresses tabs (Tiger_Profile_Types).
; Comma-separated; the base ships these, a product-builder tailors them per install (override cascade).
tiger.profile.contact.types = "Phone,Email,Website,Other"
tiger.profile.address.types = "Home,Office,Mailing"

; Default country (ISO-3166 alpha-2) for the phone-number field's country dropdown. US users don't
; think in country codes, so the picker starts here and the number is stored as E.164 (+15551234567).
; Whoever runs the app sets their audience's home country.
tiger.profile.phone.default_country = "US"

; Password policy (Tiger_Policy_Password) — NIST-informed defaults; override per-app/per-org.
tiger.password.min_length         = 8
tiger.password.history            = 5    ; disallow reusing the last N passwords (0 = off)
tiger.password.require_complexity = 0    ; off — length beats composition rules (NIST 800-63B)
tiger.password.max_age_days       = 0    ; off — NIST discourages forced rotation

; Two-factor auth (TOTP authenticator app). Enrollment also requires tiger.crypto.key
; (below) — without it the security screen reports 2FA as unavailable.
tiger.twofa.enabled = 1
tiger.twofa.issuer  =                     ; label shown in the authenticator app (blank = site name)

; Google reCAPTCHA (Tiger_Form element 'recaptcha' + Tiger_Validate_Recaptcha). OFF by
; default: the widget renders nothing and the validator passes, so forms work keyless in
; dev. site_key is PUBLIC (fine in application.ini); secret_key is SECRET (local.ini only).
tiger.recaptcha.enabled    = 0
tiger.recaptcha.version    = "v2"         ; v2 (checkbox) | v3 (invisible score)
tiger.recaptcha.site_key   =              ; public key, rendered in the page
tiger.recaptcha.secret_key =              ; secret key -> local.ini, NEVER committed
tiger.recaptcha.min_score  = 0.5          ; v3 pass threshold (0..1)
tiger.recaptcha.fail_open  = 1            ; on a Google outage: 1 = pass (availability), 0 = block
tiger.recaptcha.hide_badge = 0            ; v3 only: hide the floating badge via CSS (adds the required legal notice)
; secret_key_enc — set by the admin Settings screen: the secret encrypted at rest (Tiger_Crypto). Read
; falls back to it when the plaintext secret_key above is empty; never set this by hand.

; Sessions & auto-logout (enterprise). Two independent clocks:
;  - ttl.*         = server-side MAX session lifetime (idle), tiered by role. The hard
;                    backstop enforced by Tiger_Session_SaveHandler_DbTable even with the
;                    tab closed. Overridable live in Settings (writes ttl.authed).
;  - autologout.*  = proactive INACTIVITY logout while a tab is open. Server-authoritative:
;                    the browser polls /auth/session for time-left, and the poll only
;                    refreshes the activity clock on REAL user interaction — an idle poll
;                    checks the clock WITHOUT resetting it, so polling can't keep you alive.
tiger.session.ttl.privileged     = 28800     ; admin/superadmin/developer idle timeout, seconds (8h)
tiger.session.ttl.authed         = 604800    ; standard-user idle timeout, seconds (7d)
tiger.session.ttl.guest          = 86400     ; guest idle timeout, seconds (1d)
tiger.session.autologout.enabled = 0         ; master toggle for proactive inactivity logout
tiger.session.autologout.seconds = 900       ; inactivity before auto-logout fires (15m)
tiger.session.autologout.action  = "logout"  ; what fires: "logout" (end session) | "lock" (lock screen)
tiger.session.autologout.warn    = 60        ; warn-before-action lead time, seconds (0 = no warning)

; Location Service (Tiger_Location) — capability-based address/geo/IP lookups behind adapters.
; Pick a provider per operation group; each adapter reads tiger.location.adapters.<name>.*.
; Defaults are the zero-cost dev options (OpenStreetMap + ip-api.com). For production, switch
; the address provider to aws|google|mapbox and use a paid IP vendor.
tiger.location.address.provider         = "nominatim"  ; suggest/geocode/reverse: nominatim|aws
tiger.location.ip.provider              = "ipapi"      ; ip: ipapi (free dev) | your paid vendor
tiger.location.cache_ttl                = 86400        ; seconds to cache an IP->place lookup (APCu); 0 = off
tiger.location.adapters.nominatim.endpoint = "https://nominatim.openstreetmap.org"
tiger.location.adapters.nominatim.email    =           ; optional, per OSM policy for higher volume
tiger.location.adapters.aws.region         =           ; e.g. us-east-1
tiger.location.adapters.aws.place_index    =           ; the AWS Location Service Place Index name
;tiger.location.adapters.aws.key           =           ; AWS creds -> local.ini (or IAM role/env)
;tiger.location.adapters.aws.secret        =
tiger.location.adapters.ipapi.endpoint     = "http://ip-api.com/json"
;tiger.location.adapters.ipapi.key         =           ; if your IP vendor needs a key -> local.ini

; App encryption key — for REVERSIBLE secrets at rest (TOTP shared secret, OAuth tokens).
; 32 bytes, base64. Generate: php -r "echo Tiger_Crypto::generateKey();" (or base64 of 32
; random bytes). Set the REAL key in local.ini (secret, gitignored) — NEVER commit it,
; NEVER store it in the DB (the ciphertext lives there). Empty = TOTP enrollment disabled.
tiger.crypto.key =
; Retired key(s) during a rotation (comma-separated) — decrypt-only fallback so existing
; ciphertext still opens until `tiger crypto:rekey` re-encrypts it; then drop these. local.ini only.
tiger.crypto.key_retired =

; Password/code PEPPER — a secret HMAC'd into password + OTP/recovery hashes (Tiger_Security).
; Salts are per-record already (bcrypt); the pepper is one install-wide secret kept OUT of the
; DB, so a stolen table can't be cracked without it. RANDOM AT INSTALL (the installer / cPanel
; setup form writes it to local.ini alongside the DB creds — `tiger install:secrets` provisions
; it), NEVER committed. Do NOT change it after go-live: it can't be rotated without resetting
; every password. Empty = no pepper (legacy plain hashing; existing installs unaffected).
tiger.security.pepper =
; Retired pepper(s) during a rotation (comma-separated) — verify-only fallback so passwords
; re-pepper on next login; drop once everyone has turned over. local.ini only, never committed.
tiger.security.pepper_retired =

; Mail (Tiger_Mail) — transport + sender defaults. The DEFAULT is boring PHP mail()
; (sendmail); switch to SMTP+TLS per deploy. SMTP host/credentials belong in local.ini
; (secrets, gitignored); the app sets its real from-address in application.ini.
mail.transport     = "mail"           ; mail (PHP sendmail) | smtp
mail.from.email    = "no-reply@localhost"
mail.from.name     = "Tiger"
mail.smtp.host     =                  ; e.g. email-smtp.us-east-1.amazonaws.com
mail.smtp.port     = 587
mail.smtp.ssl      = "tls"            ; tls | ssl | (empty for none)
mail.smtp.auth     = "login"          ; login | plain | crammd5 | (empty for none)
mail.smtp.username =
mail.smtp.password =

; Logging (Tiger_Log). Writer + level are PLUGGABLE. Default sink is error_log(),
; which every cloud log agent already collects (AWS CloudWatch, GCP Ops Agent,
; Azure Diagnostics) — zero app dependencies. Switch per deployment (usually in
; local.ini): null | errorlog | stderr | stdout | stream | syslog | cloudwatch |
; gcp | azure — or a comma-list to fan out (e.g. "stderr,cloudwatch").
tiger.log.writer    = "errorlog"
tiger.log.min_level = "info"             ; debug|info|notice|warn|error|crit

; Cloud sinks — used only when tiger.log.writer names them; each needs its SDK/key
; (missing → Tiger_Log warns once and falls back to errorlog). Uncomment to use.
; AWS CloudWatch Logs (needs aws/aws-sdk-php; credentials via the instance role):
;tiger.log.cloudwatch.group  = "/tiger/prod/app"
;tiger.log.cloudwatch.stream = "app"          ; default: hostname
;tiger.log.cloudwatch.region = "us-east-1"    ; default: AWS_REGION env
; GCP Cloud Logging (needs google/cloud-logging; credentials via ADC):
;tiger.log.gcp.project = "my-gcp-project"     ; default: auto-detected on GCE/GKE
;tiger.log.gcp.log     = "tiger"
; Azure Monitor / Application Insights (ext/curl only, no SDK):
;tiger.log.azure.connection_string = "InstrumentationKey=…;IngestionEndpoint=…"
;tiger.log.azure.role              = "tiger"
; File/stream sink target (when tiger.log.writer = stream|file):
;tiger.log.stream.path = "/var/log/tiger/app.log"

; --- Media module (see MEDIA.md) ---
; Storage disks: each names an adapter + settings; media rows record which disk holds them.
; Filesystem roots are relative to the APP ROOT (portable across deploys). Public files live
; under the docroot (served directly at public_url); private files live OUTSIDE it and are
; streamed via /media/file/<id> with an ACL check.
media.default_disk               = "local"
media.disks.local.adapter        = "filesystem"
media.disks.local.public_root    = "public/_media"      ; under docroot
media.disks.local.public_url     = "/_media"            ; base URL for public files
media.disks.local.private_root   = "storage/media"      ; outside docroot (streamed)
; S3 disk (needs aws/aws-sdk-php; creds via the default AWS chain / EC2 IAM role, or key+secret
; below). One bucket: public files go under public_prefix (serve via CDN/bucket policy), private
; files under private_prefix (served by short-lived presigned URLs). Uncomment + set to use, and
; set media.default_disk = "s3" (or reference the disk per upload).
;media.disks.s3.adapter          = "s3"
;media.disks.s3.bucket           =
;media.disks.s3.region           = "us-east-1"
;media.disks.s3.prefix           =                      ; base key prefix for everything (optional)
;media.disks.s3.public_prefix    = "public/"            ; world-readable prefix (CDN/bucket policy)
;media.disks.s3.private_prefix   = "private/"           ; presigned-only prefix
;media.disks.s3.cdn              =                      ; CloudFront/custom host for public URLs (no scheme)
;media.disks.s3.presign_ttl      = 900                  ; private presigned-URL lifetime, seconds (0 = stream via app)
;media.disks.s3.public_acl       = 0                    ; 1 = send ACL=public-read on puts (only if the bucket allows ACLs)
;media.disks.s3.endpoint         =                      ; S3-compatible endpoint (MinIO/Spaces/R2); omit for AWS
;media.disks.s3.use_path_style   = 0                    ; 1 for path-style endpoints
;media.disks.s3.key              =                      ; static creds (optional; prefer an IAM role — keep out of core.ini)
;media.disks.s3.secret           =

; GCS disk (needs google/cloud-storage). Same public/private-prefix model as S3. Signing
; private URLs needs a service-account key_file; else Application Default Credentials.
;media.disks.gcs.adapter         = "gcs"
;media.disks.gcs.bucket          =
;media.disks.gcs.project_id      =
;media.disks.gcs.key_file        =                      ; path to a service-account JSON (for signed URLs)
;media.disks.gcs.public_prefix   = "public/"
;media.disks.gcs.private_prefix  = "private/"
;media.disks.gcs.prefix          =                      ; base key prefix (optional)
;media.disks.gcs.cdn             =                      ; Cloud CDN/custom host for public URLs
;media.disks.gcs.presign_ttl     = 900                  ; private signed-URL lifetime, seconds (0 = stream via app)
;media.disks.gcs.public_acl      = 0                    ; 1 = predefinedAcl=publicRead (only if the bucket allows ACLs)

; Azure Blob disk (needs microsoft/azure-storage-blob). Azure public access is CONTAINER-level:
; either set both public_container + private_container (make the public one's access "blob"), or
; use one `container` + prefixes (front public via CDN). Private URLs use short-lived SAS.
;media.disks.azure.adapter       = "azure"
;media.disks.azure.container     =                      ; single-container mode (with prefixes)
;media.disks.azure.public_container  =                  ; OR two-container mode: public (access=blob)
;media.disks.azure.private_container =                  ;     + private
;media.disks.azure.connection_string =                 ; OR account + key below
;media.disks.azure.account       =
;media.disks.azure.key           =                      ; account key (needed for SAS) — keep out of core.ini
;media.disks.azure.public_prefix = "public/"            ; single-container mode only
;media.disks.azure.private_prefix = "private/"
;media.disks.azure.prefix        =
;media.disks.azure.cdn           =                      ; Azure CDN/custom host for public URLs
;media.disks.azure.presign_ttl   = 900                  ; SAS lifetime, seconds (0 = stream via app)
;media.disks.azure.endpoint      =                      ; blob endpoint override (Azurite/custom)

media.max_upload                 = 52428800             ; 50 MB/file (also raise php upload_max_filesize/post_max_size)
media.allow.image                = "jpg,jpeg,png,gif,webp,svg"
media.allow.document             = "pdf,doc,docx,xls,xlsx,ppt,pptx,txt,csv,md"
media.allow.video                = "mp4,webm,mov,m4v"
media.allow.audio                = "mp3,wav,ogg,m4a"
media.allow.archive              = "zip,gz,tar,7z"

; Image variants — longest-edge px, aspect preserved (contain, no crop, no upscale).
; Generated server-side by Tiger_Media_Image (GD) when available; otherwise the browser
; makes the thumbnail on upload. Set variants.server = 0 to always offload to the client.
media.variants.thumbnail         = 200                  ; grid/list tiles, avatars
media.variants.small             = 640                  ; portfolio tiles, cards, inline
media.variants.medium            = 1280                 ; content-column images
media.variants.large             = 2048                 ; hero / lightbox source (huge-original cap)
media.variants.quality           = 90                   ; JPEG/WebP quality (favor quality, not compression)
media.variants.server            = 1                    ; 1 = use GD when present; 0 = always client-side thumb

; Scanning — all OFF by default (hooks built; plug scanners in per deploy).
media.scan.clamav                = 0                    ; ClamAV virus scan (clamd; memory-heavy)
media.scan.image                 = 0                    ; AWS Rekognition image moderation (aws-sdk-php)
media.scan.video                 = 0                    ; async video moderation + webhook callback
media.scan.image_threshold       = 80                   ; reject at/above this Rekognition confidence (0-100)

; staging mirrors production (prod-like); override only what differs per deploy.
[staging : production]

; testing = CI / unit runs: show errors AND rethrow so the test runner catches
; them instead of the framework routing to the error controller.
[testing : production]
phpSettings.display_startup_errors = 1
phpSettings.display_errors = 1
resources.frontController.params.displayExceptions = 1
resources.frontController.params.throwExceptions = 1

; development = local / dev box: show errors, but route to the error page
; (do NOT rethrow, so the site stays browsable).
[development : production]
phpSettings.display_startup_errors = 1
phpSettings.display_errors = 1
resources.frontController.params.displayExceptions = 1
tiger.log.min_level = "debug"    ; verbose logging on dev
