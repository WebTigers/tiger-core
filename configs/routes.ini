; Tiger core routes — pretty aliases for shipped default-namespace controller actions.
;
; Routes live HERE (config), never in a Bootstrap _init method. These use ZF1's native
; `resources.router.routes.*` format, so the standard Router resource applies them — no route
; code anywhere. Each maps a clean path to an IndexController action; the canonical /index/<action>
; path keeps working automagically via the default :controller/:action route regardless.
;
; A page reachable at its default MVC path needs NO entry here — only add a route for a pretty alias.
[production]

resources.router.routes.features.type              = "Zend_Controller_Router_Route_Static"
resources.router.routes.features.route             = "features"
resources.router.routes.features.defaults.module     = "default"
resources.router.routes.features.defaults.controller = "index"
resources.router.routes.features.defaults.action     = "features"

resources.router.routes.vibe.type              = "Zend_Controller_Router_Route_Static"
resources.router.routes.vibe.route             = "vibe"
resources.router.routes.vibe.defaults.module     = "default"
resources.router.routes.vibe.defaults.controller = "index"
resources.router.routes.vibe.defaults.action     = "vibe"

resources.router.routes.agency.type              = "Zend_Controller_Router_Route_Static"
resources.router.routes.agency.route             = "agency"
resources.router.routes.agency.defaults.module     = "default"
resources.router.routes.agency.defaults.controller = "index"
resources.router.routes.agency.defaults.action     = "agency"

resources.router.routes.developers.type              = "Zend_Controller_Router_Route_Static"
resources.router.routes.developers.route             = "developers"
resources.router.routes.developers.defaults.module     = "default"
resources.router.routes.developers.defaults.controller = "index"
resources.router.routes.developers.defaults.action     = "developers"

resources.router.routes.creators.type              = "Zend_Controller_Router_Route_Static"
resources.router.routes.creators.route             = "creators"
resources.router.routes.creators.defaults.module     = "default"
resources.router.routes.creators.defaults.controller = "index"
resources.router.routes.creators.defaults.action     = "creators"

resources.router.routes.hosting.type              = "Zend_Controller_Router_Route_Static"
resources.router.routes.hosting.route             = "hosting"
resources.router.routes.hosting.defaults.module     = "default"
resources.router.routes.hosting.defaults.controller = "index"
resources.router.routes.hosting.defaults.action     = "hosting"

; Self-service profile pretty alias: /user/profile -> the profile module's index. The canonical
; /profile path keeps working via the default MVC route; this is just the nicer URL (config, not code).
resources.router.routes.user_profile.type                = "Zend_Controller_Router_Route_Static"
resources.router.routes.user_profile.route               = "user/profile"
resources.router.routes.user_profile.defaults.module     = "profile"
resources.router.routes.user_profile.defaults.controller = "index"
resources.router.routes.user_profile.defaults.action     = "index"

[staging : production]

[testing : production]

[development : production]
