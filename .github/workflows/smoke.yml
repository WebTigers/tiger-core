name: Smoke test

# Prove that a release actually BOOTS, MIGRATES, and SERVES — not just that the version matches the
# tag (version-check.yml) and the vendored ZIP builds (release-zip.yml). tiger-core is a framework
# package, so we install the real skeleton (webtigers/tiger) and wire THIS checkout into it as a
# Composer path repository, then run the genuine install → migrate → boot → serve path against MariaDB.
on:
  # Callable as the release gate (release-zip.yml runs this against the exact tag before attaching the
  # vendored ZIP). Also runs on its own for day-to-day dev (main pushes + PRs). No tag trigger — the
  # release path is covered by the workflow_call gate, so a tag doesn't double-run the matrix.
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to smoke-test (blank = the triggering commit)'
        required: false
        type: string
        default: ''
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APPLICATION_ENV: production
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.3', '8.4', '8.5']

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: tiger_ci
        ports: ['3306:3306']
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    steps:
      - name: Checkout tiger-core (code under test)
        uses: actions/checkout@v4
        with:
          path: core-src
          ref: ${{ inputs.ref }}   # blank on push/PR → the triggering commit; set by the release gate

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_mysql, curl, zip, gd, sodium, apcu
          ini-values: apc.enable_cli=1, memory_limit=512M
          tools: composer:v2

      - name: Create the skeleton app, with tiger-core from this checkout (path repo)
        run: |
          composer create-project webtigers/tiger app --stability=beta --no-install --no-scripts --no-interaction
          cd app
          composer config minimum-stability dev
          composer config prefer-stable true
          composer config repositories.tigercore path "$GITHUB_WORKSPACE/core-src"
          composer require "webtigers/tiger-core:*" -W --no-scripts --no-interaction
          # sanity: the linked package must be OUR checkout
          test -f vendor/webtigers/tiger-core/library/Tiger/Version.php
          echo "linked tiger-core: $(readlink -f vendor/webtigers/tiger-core || true)"

      - name: Write CI config (throwaway DB creds + secrets)
        run: |
          KEY=$(openssl rand -base64 32)
          PEP=$(openssl rand -base64 32)
          cat > app/application/configs/local.ini <<INI
          [production]
          tiger.db.host         = "127.0.0.1"
          tiger.db.dbname       = "tiger_ci"
          tiger.db.username     = "root"
          tiger.db.password     = "root"
          tiger.crypto.key      = "$KEY"
          tiger.security.pepper = "$PEP"

          [staging : production]

          [testing : production]

          [development : production]
          INI

      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 30); do
            if php -r 'new PDO("mysql:host=127.0.0.1;port=3306", "root", "root");' 2>/dev/null; then
              echo "MariaDB is up"; exit 0
            fi
            sleep 2
          done
          echo "MariaDB never became reachable"; exit 1

      - name: Provision storage + run migrations
        working-directory: app
        run: |
          vendor/bin/tiger install:storage
          vendor/bin/tiger migrate
          vendor/bin/tiger migrate:status

      - name: Create the founding admin
        working-directory: app
        run: |
          vendor/bin/tiger install:admin \
            --email="admin@ci.local" --password="SmokeTest123" \
            --org="CI Org" --username="ciadmin" --role="developer"

      - name: Boot assertion (DB adapter + migrated schema)
        working-directory: app
        run: php "$GITHUB_WORKSPACE/core-src/ci/smoke-boot.php"

      - name: Serve + HTTP smoke
        working-directory: app
        run: |
          php -S 127.0.0.1:8000 "$GITHUB_WORKSPACE/core-src/ci/router.php" >server.log 2>&1 &
          SRV=$!
          trap 'kill $SRV 2>/dev/null || true' EXIT
          for i in $(seq 1 20); do curl -sf -o /dev/null http://127.0.0.1:8000/ && break; sleep 1; done

          fail=0
          check() {  # name expected-code url [extra curl args...]
            local name="$1" exp="$2" url="$3"; shift 3
            local code; code=$(curl -s -o /dev/null -w '%{http_code}' "$@" "$url")
            if [ "$code" = "$exp" ]; then echo "PASS  $name -> $code"; else echo "FAIL  $name -> $code (expected $exp)"; fail=1; fi
          }

          check "landing /"            200 "http://127.0.0.1:8000/"
          check "login /login"         200 "http://127.0.0.1:8000/login"
          check "/api gateway alive"   200 "http://127.0.0.1:8000/api"
          check "unknown slug 404"     404 "http://127.0.0.1:8000/no-such-page-xyzzy"
          check "org-scoped CMS page"  200 "http://127.0.0.1:8000/ci-smoke-page"

          # The seeded page (org_id = the site org) must actually DISPATCH — its body has to render, not a
          # 404 shell. This is the guard for the org_id write-stamp ↔ read-scope path: a mismatch 404s here.
          curl -s "http://127.0.0.1:8000/ci-smoke-page" >page.html || true
          if grep -q "CI_SMOKE_PAGE_OK" page.html; then
            echo "PASS  org-scoped CMS page body dispatched"
          else
            echo "FAIL  org-scoped CMS page body not found (org write/read mismatch?)"; echo "  body: $(head -c 300 page.html)"; fail=1
          fi

          # the /api gateway must answer with the JSON envelope contract (result key present), even for
          # an empty/refused message — proves the webservice layer is wired, not just returning a page.
          curl -s "http://127.0.0.1:8000/api" >api.json || true
          if php -r '$j=json_decode(file_get_contents("api.json"),true); exit(is_array($j) && array_key_exists("result",$j) ? 0 : 1);'; then
            echo "PASS  /api returns the JSON envelope"
          else
            echo "FAIL  /api envelope"; echo "  body: $(head -c 400 api.json)"; fail=1
          fi

          if [ "$fail" != "0" ]; then
            echo "::group::server.log"; cat server.log; echo "::endgroup::"
            echo "::group::app log";   cat var/log/*.log 2>/dev/null || echo "(no app log)"; echo "::endgroup::"
            exit 1
          fi
          echo "All HTTP smoke checks passed."

  # A single, stable check for branch protection to require — green only if EVERY matrix cell passed.
  # Gating on this (not "smoke (8.1)" etc.) means changing the PHP matrix never silently breaks the rule.
  smoke-passed:
    needs: smoke
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert the whole smoke matrix passed
        run: |
          if [ "${{ needs.smoke.result }}" != "success" ]; then
            echo "smoke matrix did not pass (result: ${{ needs.smoke.result }})"; exit 1
          fi
          echo "smoke matrix passed on every PHP version"
