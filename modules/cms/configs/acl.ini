; CMS module ACL — TIGER-OWNED (first-party module).
;
; The authoring surface is admin-and-above; the deny-by-default spine in core
; acl.ini governs everyone else (guest/user/manager see nothing here). Two
; resources: the admin controller (list + editor views) and the /api service
; (save/delete/restore). Resource names follow the framework convention —
; Tiger_Controller_Plugin_Authorization resolves a module controller to
; "<Module>_<Controller>Controller", and Tiger_Ajax_ServiceFactory resolves a
; service to "<Module>_Service_<Name>".
[production]

acl.resources.cms_page_ctrl.resource = "Cms_PageController"
acl.resources.cms_page_svc.resource  = "Cms_Service_Page"

acl.rules.cms_page_ctrl.role       = "admin"
acl.rules.cms_page_ctrl.resource   = "Cms_PageController"
acl.rules.cms_page_ctrl.permission = "allow"

acl.rules.cms_page_svc.role       = "admin"
acl.rules.cms_page_svc.resource   = "Cms_Service_Page"
acl.rules.cms_page_svc.permission = "allow"

acl.resources.cms_menu_ctrl.resource = "Cms_MenuController"
acl.resources.cms_menu_svc.resource  = "Cms_Service_Menu"

acl.rules.cms_menu_ctrl.role       = "admin"
acl.rules.cms_menu_ctrl.resource   = "Cms_MenuController"
acl.rules.cms_menu_ctrl.permission = "allow"

acl.rules.cms_menu_svc.role       = "admin"
acl.rules.cms_menu_svc.resource   = "Cms_Service_Menu"
acl.rules.cms_menu_svc.permission = "allow"

acl.resources.cms_settings_ctrl.resource = "Cms_SettingsController"
acl.resources.cms_settings_svc.resource  = "Cms_Service_Settings"

acl.rules.cms_settings_ctrl.role       = "admin"
acl.rules.cms_settings_ctrl.resource   = "Cms_SettingsController"
acl.rules.cms_settings_ctrl.permission = "allow"

acl.rules.cms_settings_svc.role       = "admin"
acl.rules.cms_settings_svc.resource   = "Cms_Service_Settings"
acl.rules.cms_settings_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
