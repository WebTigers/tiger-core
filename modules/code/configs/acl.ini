; Tiger Code module ACL — TIGER-OWNED (first-party module).
;
; Authoring server-executed PHP is the TOP privilege in the system, so this surface is
; gated to `superadmin` and above (the god `developer` role inherits it) — NOT ordinary
; `admin`. This is the `code.execute` gate. The deny-by-default spine denies everyone else.
[production]

acl.resources.code_index_ctrl.resource = "Code_IndexController"
acl.resources.code_svc.resource        = "Code_Service_Code"

acl.rules.code_index_ctrl.role       = "superadmin"
acl.rules.code_index_ctrl.resource   = "Code_IndexController"
acl.rules.code_index_ctrl.permission = "allow"

acl.rules.code_svc.role       = "superadmin"
acl.rules.code_svc.resource   = "Code_Service_Code"
acl.rules.code_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
