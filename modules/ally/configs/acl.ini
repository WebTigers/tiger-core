; TigerAlly module ACL — TIGER-OWNED (first-party). A read-only accessibility inspector; admin+.
[production]

acl.resources.ally_index_ctrl.resource = "Ally_IndexController"
acl.resources.ally_scan_svc.resource   = "Ally_Service_Scan"

acl.rules.ally_index_ctrl.role       = "admin"
acl.rules.ally_index_ctrl.resource   = "Ally_IndexController"
acl.rules.ally_index_ctrl.permission = "allow"

acl.rules.ally_scan_svc.role       = "admin"
acl.rules.ally_scan_svc.resource   = "Ally_Service_Scan"
