; TigerAgent ACL — deny-by-default. The capability TIERS are expressed here as pure ACL, so
; "what the agent can do = what the user's role can do" needs no role compare in code
; (TIGERAGENT.md §2a). The role ladder inherits upward (manager → … → developer), so each
; allow below is the FLOOR for that capability.
[production]

; --- resources ---
acl.resources.agent_admin_ctrl.resource   = "Agent_AdminController"      ; settings screen
acl.resources.agent_settings_svc.resource = "Agent_Service_Settings"     ; save settings
acl.resources.agent_chat_svc.resource     = "Agent_Service_Agent"        ; the aside turn engine
acl.resources.agent_forge.resource        = "Tiger_Agent_Forge"          ; the sharp write tiers
acl.resources.agent_scout.resource        = "Tiger_Agent_Scout"          ; the read tiers (Scout)

; --- settings: admin configures the AI account ---
acl.rules.agent_admin_ctrl.role       = "admin"
acl.rules.agent_admin_ctrl.resource   = "Agent_AdminController"
acl.rules.agent_admin_ctrl.permission = "allow"

acl.rules.agent_settings_svc.role       = "admin"
acl.rules.agent_settings_svc.resource   = "Agent_Service_Settings"
acl.rules.agent_settings_svc.permission = "allow"

; --- chat: content managers and up may open the aside. What they can actually DO through it
;     is bounded per-call by each target service's own ACL (a manager reaches content services;
;     an admin reaches the data surface) — so "content only for some" is automatic. ---
acl.rules.agent_chat_svc.role       = "manager"
acl.rules.agent_chat_svc.resource   = "Agent_Service_Agent"
acl.rules.agent_chat_svc.permission = "allow"

; --- forge.file: writing files into public app modules — superadmin+ (the Code Area floor) ---
acl.rules.agent_forge_file.role       = "superadmin"
acl.rules.agent_forge_file.resource   = "Tiger_Agent_Forge"
acl.rules.agent_forge_file.privilege  = "file"
acl.rules.agent_forge_file.permission = "allow"

; --- forge.module: scaffolding a whole module — developer only (the god role) ---
acl.rules.agent_forge_module.role       = "developer"
acl.rules.agent_forge_module.resource   = "Tiger_Agent_Forge"
acl.rules.agent_forge_module.privilege  = "module"
acl.rules.agent_forge_module.permission = "allow"

; --- scout.inventory: the system map (modules/snippets/theme) is non-sensitive metadata — admin+ ---
acl.rules.agent_scout_inv.role       = "admin"
acl.rules.agent_scout_inv.resource   = "Tiger_Agent_Scout"
acl.rules.agent_scout_inv.privilege  = "inventory"
acl.rules.agent_scout_inv.permission = "allow"

; --- scout.read: tree/file/grep across the code surface — superadmin+ (pairs with forge.file) ---
acl.rules.agent_scout_read.role       = "superadmin"
acl.rules.agent_scout_read.resource   = "Tiger_Agent_Scout"
acl.rules.agent_scout_read.privilege  = "read"
acl.rules.agent_scout_read.permission = "allow"

[staging : production]

[testing : production]

[development : production]
