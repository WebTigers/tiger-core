; Access module ACL — TIGER-OWNED (first-party module).
;
; Users + Organizations admin is admin-and-above; the deny-by-default spine in core
; acl.ini governs everyone else. Four resources: the two admin controllers (list +
; editor views) and the two /api services (datatable/save/delete).
[production]

acl.resources.access_user_ctrl.resource = "Access_UserController"
acl.resources.access_org_ctrl.resource  = "Access_OrgController"
acl.resources.access_user_svc.resource   = "Access_Service_User"
acl.resources.access_org_svc.resource    = "Access_Service_Org"

acl.rules.access_user_ctrl.role       = "admin"
acl.rules.access_user_ctrl.resource   = "Access_UserController"
acl.rules.access_user_ctrl.permission = "allow"

acl.rules.access_org_ctrl.role       = "admin"
acl.rules.access_org_ctrl.resource   = "Access_OrgController"
acl.rules.access_org_ctrl.permission = "allow"

acl.rules.access_user_svc.role       = "admin"
acl.rules.access_user_svc.resource   = "Access_Service_User"
acl.rules.access_user_svc.permission = "allow"

acl.rules.access_org_svc.role       = "admin"
acl.rules.access_org_svc.resource   = "Access_Service_Org"
acl.rules.access_org_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
