; System module ACL — TIGER-OWNED (first-party). Managing modules (turning platform
; features on/off) is a superadmin+ privilege. Deny-by-default governs everyone else.
[production]

acl.resources.system_modules_ctrl.resource = "System_ModulesController"
acl.resources.system_modules_svc.resource  = "System_Service_Modules"

acl.rules.system_modules_ctrl.role       = "superadmin"
acl.rules.system_modules_ctrl.resource   = "System_ModulesController"
acl.rules.system_modules_ctrl.permission = "allow"

acl.rules.system_modules_svc.role       = "superadmin"
acl.rules.system_modules_svc.resource   = "System_Service_Modules"
acl.rules.system_modules_svc.permission = "allow"

; System settings (session lifetime + auto-logout) — admin+, like the other Settings pages.
acl.resources.system_settings_ctrl.resource = "System_SettingsController"
acl.resources.system_settings_svc.resource  = "System_Service_Settings"

acl.rules.system_settings_ctrl.role       = "admin"
acl.rules.system_settings_ctrl.resource   = "System_SettingsController"
acl.rules.system_settings_ctrl.permission = "allow"

acl.rules.system_settings_svc.role       = "admin"
acl.rules.system_settings_svc.resource   = "System_Service_Settings"
acl.rules.system_settings_svc.permission = "allow"

; Dashboard — saving the per-user widget layout (order + collapsed). admin+, like the dashboard itself.
acl.resources.system_dashboard_svc.resource = "System_Service_Dashboard"

acl.rules.system_dashboard_svc.role       = "admin"
acl.rules.system_dashboard_svc.resource   = "System_Service_Dashboard"
acl.rules.system_dashboard_svc.permission = "allow"

; Updates — the one-click self-updater (platform + modules). Superadmin+, like module management.
acl.resources.system_updates_ctrl.resource = "System_UpdatesController"
acl.resources.system_updates_svc.resource  = "System_Service_Updates"

acl.rules.system_updates_ctrl.role       = "superadmin"
acl.rules.system_updates_ctrl.resource   = "System_UpdatesController"
acl.rules.system_updates_ctrl.permission = "allow"

acl.rules.system_updates_svc.role       = "superadmin"
acl.rules.system_updates_svc.resource   = "System_Service_Updates"
acl.rules.system_updates_svc.permission = "allow"

; ACL Simulator — a read-only "why am I locked out?" diagnostic. Superadmin+.
acl.resources.system_acl_ctrl.resource = "System_AclController"
acl.resources.system_acl_svc.resource  = "System_Service_Acl"

acl.rules.system_acl_ctrl.role       = "superadmin"
acl.rules.system_acl_ctrl.resource   = "System_AclController"
acl.rules.system_acl_ctrl.permission = "allow"

acl.rules.system_acl_svc.role       = "superadmin"
acl.rules.system_acl_svc.resource   = "System_Service_Acl"
acl.rules.system_acl_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
