; Search module ACL — TIGER-OWNED (first-party). PUBLIC: the search service + results page are
; guest-allowed (providers self-limit to published, in-scope content). Deny-by-default elsewhere.
[production]

acl.resources.search_svc.resource  = "Search_Service_Search"
acl.resources.search_index_ctrl.resource = "Search_IndexController"

acl.rules.search_svc_pub.role       = "guest"
acl.rules.search_svc_pub.resource   = "Search_Service_Search"
acl.rules.search_svc_pub.permission = "allow"

acl.rules.search_index_pub.role       = "guest"
acl.rules.search_index_pub.resource   = "Search_IndexController"
acl.rules.search_index_pub.permission = "allow"

[staging : production]

[testing : production]

[development : production]
