; Analytics ACL — the settings screen + its /api service are admin-only (deny-by-default; without
; these allows the screen and save are refused). Its own resource so access is grantable on its own.
[production]

acl.resources.analytics_admin_ctrl.resource = "Analytics_AdminController"
acl.resources.analytics_svc.resource         = "Analytics_Service_Analytics"
acl.resources.analytics_reports_svc.resource = "Analytics_Service_Reports"

acl.rules.analytics_admin_ctrl.role       = "admin"
acl.rules.analytics_admin_ctrl.resource   = "Analytics_AdminController"
acl.rules.analytics_admin_ctrl.permission = "allow"

acl.rules.analytics_svc.role       = "admin"
acl.rules.analytics_svc.resource   = "Analytics_Service_Analytics"
acl.rules.analytics_svc.permission = "allow"

acl.rules.analytics_reports_svc.role       = "admin"
acl.rules.analytics_reports_svc.resource   = "Analytics_Service_Reports"
acl.rules.analytics_reports_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
