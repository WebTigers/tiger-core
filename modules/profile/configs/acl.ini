; Profile module ACL — TIGER-OWNED (first-party module).
;
; Self-service: any authenticated user (role `user`, inherited upward) edits their OWN profile.
; Ownership is enforced IN the service (always $this->_user_id, never a payload id), so a plain
; `user` cannot reach anyone else's row. The org profile (admin-gated) lands in a later slice.
[production]

acl.resources.profile_index_ctrl.resource = "Profile_IndexController"
acl.resources.profile_user_svc.resource   = "Profile_Service_User"
acl.resources.profile_security_svc.resource = "Profile_Service_Security"
acl.resources.profile_avatar_svc.resource   = "Profile_Service_Avatar"
acl.resources.profile_contact_svc.resource  = "Profile_Service_Contact"
acl.resources.profile_address_svc.resource  = "Profile_Service_Address"

acl.rules.profile_index_ctrl.role       = "user"
acl.rules.profile_index_ctrl.resource   = "Profile_IndexController"
acl.rules.profile_index_ctrl.permission = "allow"

acl.rules.profile_user_svc.role       = "user"
acl.rules.profile_user_svc.resource   = "Profile_Service_User"
acl.rules.profile_user_svc.permission = "allow"

acl.rules.profile_security_svc.role       = "user"
acl.rules.profile_security_svc.resource   = "Profile_Service_Security"
acl.rules.profile_security_svc.permission = "allow"

acl.rules.profile_avatar_svc.role       = "user"
acl.rules.profile_avatar_svc.resource   = "Profile_Service_Avatar"
acl.rules.profile_avatar_svc.permission = "allow"

acl.rules.profile_contact_svc.role       = "user"
acl.rules.profile_contact_svc.resource   = "Profile_Service_Contact"
acl.rules.profile_contact_svc.permission = "allow"

acl.rules.profile_address_svc.role       = "user"
acl.rules.profile_address_svc.resource   = "Profile_Service_Address"
acl.rules.profile_address_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
