; ==============================================================================
;  TIGER-OWNED - DO NOT EDIT. Ships in the framework and is REPLACED on every
;  update (composer update / Module Manager) -- any edit here is SILENTLY LOST.
;  Customize by OVERRIDING in an APP-OWNED tier (merges on top, later wins, and
;  survives updates): application/configs/application.ini * local.ini (secrets) *
;  the `config` DB table (runtime, no deploy).  ACL rules: your OWN module's
;  acl.ini or the acl_* DB tables.  See ARCHITECTURE.md Sec 0 + Sec 5 (cascade).
; ==============================================================================

; Profile module ACL — TIGER-OWNED (first-party module).
;
; Self-service: any authenticated user (role `user`, inherited upward) edits their OWN profile.
; Ownership is enforced IN the service (always $this->_user_id, never a payload id), so a plain
; `user` cannot reach anyone else's row. The org profile (admin-gated) lands in a later slice.
[production]

acl.resources.profile_index_ctrl.resource = "Profile_IndexController"
acl.resources.profile_org_ctrl.resource      = "Profile_OrgController"
acl.resources.profile_org_svc.resource        = "Profile_Service_Org"
acl.resources.profile_orgcontact_svc.resource = "Profile_Service_OrgContact"
acl.resources.profile_orgaddress_svc.resource = "Profile_Service_OrgAddress"
acl.resources.profile_orglogo_svc.resource    = "Profile_Service_OrgLogo"
acl.resources.profile_user_svc.resource   = "Profile_Service_User"
acl.resources.profile_security_svc.resource = "Profile_Service_Security"
acl.resources.profile_avatar_svc.resource   = "Profile_Service_Avatar"
acl.resources.profile_contact_svc.resource  = "Profile_Service_Contact"
acl.resources.profile_address_svc.resource  = "Profile_Service_Address"

acl.rules.profile_index_ctrl.role       = "user"
acl.rules.profile_index_ctrl.resource   = "Profile_IndexController"
acl.rules.profile_index_ctrl.permission = "allow"

; Org profile is admin-only (a person's own account is `user`; their org is `admin`).
acl.rules.profile_org_ctrl.role       = "admin"
acl.rules.profile_org_ctrl.resource   = "Profile_OrgController"
acl.rules.profile_org_ctrl.permission = "allow"

acl.rules.profile_org_svc.role       = "admin"
acl.rules.profile_org_svc.resource   = "Profile_Service_Org"
acl.rules.profile_org_svc.permission = "allow"

acl.rules.profile_orgcontact_svc.role       = "admin"
acl.rules.profile_orgcontact_svc.resource   = "Profile_Service_OrgContact"
acl.rules.profile_orgcontact_svc.permission = "allow"

acl.rules.profile_orgaddress_svc.role       = "admin"
acl.rules.profile_orgaddress_svc.resource   = "Profile_Service_OrgAddress"
acl.rules.profile_orgaddress_svc.permission = "allow"

acl.rules.profile_orglogo_svc.role       = "admin"
acl.rules.profile_orglogo_svc.resource   = "Profile_Service_OrgLogo"
acl.rules.profile_orglogo_svc.permission = "allow"

acl.rules.profile_user_svc.role       = "user"
acl.rules.profile_user_svc.resource   = "Profile_Service_User"
acl.rules.profile_user_svc.permission = "allow"

acl.rules.profile_security_svc.role       = "user"
acl.rules.profile_security_svc.resource   = "Profile_Service_Security"
acl.rules.profile_security_svc.permission = "allow"

acl.rules.profile_avatar_svc.role       = "user"
acl.rules.profile_avatar_svc.resource   = "Profile_Service_Avatar"
acl.rules.profile_avatar_svc.permission = "allow"

acl.rules.profile_contact_svc.role       = "user"
acl.rules.profile_contact_svc.resource   = "Profile_Service_Contact"
acl.rules.profile_contact_svc.permission = "allow"

acl.rules.profile_address_svc.role       = "user"
acl.rules.profile_address_svc.resource   = "Profile_Service_Address"
acl.rules.profile_address_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
