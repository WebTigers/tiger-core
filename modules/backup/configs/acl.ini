; Backup module ACL — TIGER-OWNED (first-party). Admin+. Backup/restore is a powerful operation;
; keep it admin-gated, deny-by-default.
[production]

acl.resources.backup_index_ctrl.resource = "Backup_IndexController"
acl.resources.backup_svc.resource        = "Backup_Service_Backup"

acl.rules.backup_index_ctrl.role       = "admin"
acl.rules.backup_index_ctrl.resource   = "Backup_IndexController"
acl.rules.backup_index_ctrl.permission = "allow"

acl.rules.backup_svc.role       = "admin"
acl.rules.backup_svc.resource   = "Backup_Service_Backup"
acl.rules.backup_svc.permission = "allow"

[staging : production]

[testing : production]

[development : production]
